version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loanlens
      POSTGRES_USER: loanlens
      POSTGRES_PASSWORD: loanlens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanlens -d loanlens"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - rehearsal-postgres:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3.7
    environment:
      SERVICES: s3,kms
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls >/dev/null 2>&1 && awslocal kms list-aliases >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  rehearsal-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "scripts/prepare_rehearsal_aws.py"]
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: loanlens-rehearsal
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_KMS_ENDPOINT_URL: http://localstack:4566
      AWS_KMS_KEY_ID: alias/loanlens-rehearsal
      AWS_S3_FORCE_PATH_STYLE: "true"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rehearsal-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      SECRET_KEY: rehearsal-secret-key-change-me
      DATABASE_PROVIDER: postgresql
      PRISMA_SCHEMA_PATH: ./schema.prisma
      DATABASE_URL: postgresql://loanlens:loanlens@postgres:5432/loanlens
      DIRECT_URL: postgresql://loanlens:loanlens@postgres:5432/loanlens
      API_V1_PREFIX: /api/v1
      FRONTEND_URL: http://frontend:3000
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER:-}
      CLERK_JWT_AUDIENCE: ${CLERK_JWT_AUDIENCE:-}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: loanlens-rehearsal
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_KMS_ENDPOINT_URL: http://localstack:4566
      AWS_KMS_KEY_ID: alias/loanlens-rehearsal
      AWS_S3_FORCE_PATH_STYLE: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health/ready').status == 200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_ENABLE_AUTH: ${NEXT_PUBLIC_ENABLE_AUTH:-true}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      INTERNAL_API_URL: http://backend:8000/api/v1
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  rehearsal-smoke:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "scripts/rehearse_production.py"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      REHEARSAL_BACKEND_URL: http://backend:8000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: loanlens-rehearsal
      AWS_S3_ENDPOINT_URL: http://localstack:4566
      AWS_KMS_ENDPOINT_URL: http://localstack:4566
      AWS_KMS_KEY_ID: alias/loanlens-rehearsal
      AWS_S3_FORCE_PATH_STYLE: "true"
      SECRET_KEY: rehearsal-secret-key-change-me
      DATABASE_URL: postgresql://loanlens:loanlens@postgres:5432/loanlens
      DIRECT_URL: postgresql://loanlens:loanlens@postgres:5432/loanlens
    restart: "no"

volumes:
  rehearsal-postgres:
